<!--
  TEMPLATE DE EMAIL - Faixa Rosa / Pink House
  Cole este HTML no Supabase Dashboard > Authentication > Email Templates > Confirm signup
  Variaveis disponiveis: {{ .ConfirmationURL }}, {{ .Email }}, {{ .SiteURL }}
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f8f4f6;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8f4f6;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">

          <!-- Header com logo + nome -->
          <tr>
            <td style="background:linear-gradient(135deg,#d91d83,#ff5c8d);padding:28px 24px;text-align:center;">
              <table cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td style="vertical-align:middle;padding-right:10px;">
                    <img src="https://i.imgur.com/Cix818V.png" alt="Logo" width="40" height="40" style="display:block;border-radius:50%;background:#fff;" />
                  </td>
                  <td style="vertical-align:middle;">
                    <span style="font-size:22px;font-weight:bold;color:#ffffff;letter-spacing:0.5px;">Pink House</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Corpo do email -->
          <tr>
            <td style="padding:32px 24px;">
              <h1 style="margin:0 0 16px;font-size:20px;font-weight:bold;color:#1a1a1a;text-align:center;">
                Confirme seu e-mail
              </h1>
              <p style="margin:0 0 24px;font-size:14px;line-height:1.6;color:#555555;text-align:center;">
                Clique no botao abaixo para verificar seu e-mail e ativar sua conta na <strong style="color:#d91d83;">Pink House</strong>.
              </p>

              <!-- Botao CTA -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background-color:#d91d83;color:#ffffff;font-size:15px;font-weight:bold;text-decoration:none;padding:14px 36px;border-radius:50px;letter-spacing:0.3px;">
                      Verificar e-mail
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:24px 0 0;font-size:12px;line-height:1.5;color:#999999;text-align:center;">
                Se voce nao criou uma conta na Pink House, ignore este e-mail.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#fdf2f8;padding:16px 24px;text-align:center;border-top:1px solid #fce7f3;">
              <p style="margin:0;font-size:11px;color:#999999;">
                &copy; 2026 Pink House. Todos os direitos reservados.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
